name: Mirror to personal repo

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to personal repo
        run: |
          git push https://Chucks1093:${{ secrets.PERSONAL_REPO_TOKEN }}@github.com/Chucks1093/provance-client.git main --force
